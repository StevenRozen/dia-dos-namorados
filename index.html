    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #ffe6e6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            user-select: none;
        }

        /* TELA DE SENHA */
        #login-screen {
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 320px;
            width: 90%;
            z-index: 20;
        }
        h2 { color: #ff4d4d; margin-top: 0; }
        input {
            padding: 12px;
            border: 2px solid #ffb3b3;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 16px;
            width: 80%;
            text-align: center;
            outline: none;
        }
        input:focus { border-color: #ff4d4d; }
        button {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 90%;
            transition: background 0.2s;
        }
        button:hover { background-color: #e63939; }
        #error-message { color: #cc0000; font-size: 14px; margin-top: 10px; display: none; }

        /* GALERIA DE NAVEGAÇÃO */
        #gallery {
            display: none;
            width: 95%;
            max-width: 550px;
            text-align: center;
        }
        
        .slider-container {
            position: relative;
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .slide {
            display: none;
            width: 100%;
            animation: fade 0.6s ease-in-out; 
        }

        @keyframes fade {
            from { opacity: 0.3; } 
            to { opacity: 1; }
        }

        .slide img {
            width: 100%;
            height: 450px;
            object-fit: contain; /* Mantém a proporção real da foto sem cortar partes importantes */
            background-color: #fff6f6;
            border-radius: 12px;
        }

        /* Botões de Navegar (Setas) */
        .prev, .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(255, 255, 255, 0.85);
            color: #ff4d4d;
            border: none;
            font-size: 22px;
            font-weight: bold;
            padding: 12px 16px;
            cursor: pointer;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: 0.2s;
            z-index: 10;
        }
        .prev:hover, .next:hover { background-color: #ff4d4d; color: white; }
        .prev { left: 25px; }
        .next { right: 25px; }

        /* Indicador de páginas */
        .counter {
            margin-top: 15px;
            font-size: 14px;
            color: #777;
            font-weight: bold;
        }
    </style>

    <script>
        // CONFIGURAÇÕES DA SUA PÁGINA:
        const SENHA_CORRETA = "loveyou"; // Altere para a senha que desejar aqui
        const TEMPO_TROCA = 10000;     // Tempo fixado em 2 segundos (2000ms)

        let currentSlideIndex = 0;
        let autoSlideTimer;

        function checkPassword() {
            const input = document.getElementById('password-input').value;
            const errorMessage = document.getElementById('error-message');
            
            if (input === SENHA_CORRETA) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('gallery').style.display = 'block';
                showSlide(currentSlideIndex);
                startAutoSlide();
            } else {
                errorMessage.style.display = 'block';
            }
        }

        function showSlide(index) {
            const slides = document.getElementsByClassName("slide");
            const counter = document.getElementById("slide-counter");
            
            if (index >= slides.length) { currentSlideIndex = 0; }
            if (index < 0) { currentSlideIndex = slides.length - 1; }

            for (let i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }

            slides[currentSlideIndex].style.display = "block";
            counter.innerText = `Foto ${currentSlideIndex + 1} de ${slides.length}`;
        }

        function startAutoSlide() {
            autoSlideTimer = setInterval(() => {
                currentSlideIndex++;
                showSlide(currentSlideIndex);
            }, TEMPO_TROCA);
        }

        function changeSlide(step) {
            clearInterval(autoSlideTimer);
            currentSlideIndex += step;
            showSlide(currentSlideIndex);
            startAutoSlide();
        }
    </script>
